<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Epicycles → Govern the Gaps</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0A0B0D;
    --ink:       #FFFFFF;
    --muted:     #8A93A0;
    --rule:      #242932;
    --c-models:  #EC4899;   /* pink   — the model / the function */
    --c-line1:   #2DE2A0;   /* mint   — 1st line · the desk */
    --c-line2:   #4DD0E1;   /* cyan   — 2nd line · risk & validation */
    --c-line3:   #F4D03F;   /* yellow — 3rd line · internal audit */
    --serif: "Playfair Display", Georgia, serif;
    --sans:  "Source Sans 3", Arial, sans-serif;
    --mono:  "JetBrains Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: var(--sans); background: var(--bg); color: var(--ink); overflow: hidden; -webkit-font-smoothing: antialiased; }
  .stage { position: fixed; inset: 0; background: var(--bg); display: grid; place-items: center; }
  svg { width: min(96vw, 1040px); height: auto; display: block; }
  .eyebrow { font-family: var(--mono); font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="stage">
  <svg viewBox="0 0 1040 1180" xmlns="http://www.w3.org/2000/svg"
       aria-label="Two panels. Top: the model and three lines of defense tangled in redundant overlapping epicycle arcs. Bottom: the same four entities with only the minimal check living between each adjacent pair.">
    <defs>
      <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M40,0 L0,0 L0,40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      </pattern>
    </defs>
    <rect x="0" y="0" width="1040" height="1180" fill="var(--bg)"/>
    <rect x="0" y="0" width="1040" height="1180" fill="url(#grid)"/>

    <!-- =========================== PANEL 1 — EPICYCLES =========================== -->
    <text x="90" y="58" class="eyebrow" font-size="20" fill="var(--c-models)">Epicycles</text>
    <text x="90" y="90" class="label-serif" font-family="var(--serif)" font-size="30" fill="var(--ink)">A check on every line, on every line.</text>

    <!-- the tangle: nested + gap-centred ellipses, white hairlines -->
    <g fill="none" stroke="#FFFFFF" stroke-width="1.6" opacity="0.55">
      <ellipse cx="547" cy="300" rx="470" ry="222"/>
      <ellipse cx="547" cy="300" rx="452" ry="206"/>
      <ellipse cx="420" cy="300" rx="340" ry="150"/>
      <ellipse cx="674" cy="300" rx="340" ry="150"/>
      <ellipse cx="294" cy="300" rx="205" ry="118"/>
      <ellipse cx="547" cy="300" rx="205" ry="118"/>
      <ellipse cx="800" cy="300" rx="205" ry="118"/>
      <ellipse cx="294" cy="300" rx="86" ry="74"/>
      <ellipse cx="547" cy="300" rx="86" ry="74"/>
      <ellipse cx="800" cy="300" rx="86" ry="74"/>
    </g>

    <!-- the four entities -->
    <g font-family="var(--mono)" font-weight="700" font-size="19" text-anchor="middle">
      <rect x="90"  y="250" width="155" height="100" rx="6" fill="var(--c-models)"/>
      <text x="167" y="306" fill="#0A0B0D">MODEL</text>
      <rect x="343" y="250" width="155" height="100" rx="6" fill="var(--c-line1)"/>
      <text x="420" y="306" fill="#0A0B0D">1ST LINE</text>
      <rect x="596" y="250" width="155" height="100" rx="6" fill="var(--c-line2)"/>
      <text x="673" y="306" fill="#0A0B0D">2ND LINE</text>
      <rect x="849" y="250" width="155" height="100" rx="6" fill="var(--c-line3)"/>
      <text x="926" y="306" fill="#0A0B0D">3RD LINE</text>
    </g>
    <text x="547" y="556" text-anchor="middle" class="label-mono" font-family="var(--mono)" font-size="15" fill="var(--muted)">eighty loops, nobody knows which one still matters</text>

    <!-- divider -->
    <line x1="90" y1="636" x2="950" y2="636" stroke="var(--rule)" stroke-width="1"/>

    <!-- =========================== PANEL 2 — GOVERN THE GAPS =========================== -->
    <text x="90" y="706" class="eyebrow" font-size="20" fill="var(--c-line1)">Govern the gaps</text>
    <text x="90" y="738" class="label-serif" font-family="var(--serif)" font-size="30" fill="var(--ink)">The checks live between the lines &mdash; and only there.</text>

    <!-- the four entities, same plane -->
    <g font-family="var(--mono)" font-weight="700" font-size="19" text-anchor="middle">
      <rect x="90"  y="880" width="155" height="100" rx="6" fill="var(--c-models)"/>
      <text x="167" y="936" fill="#0A0B0D">MODEL</text>
      <rect x="343" y="880" width="155" height="100" rx="6" fill="var(--c-line1)"/>
      <text x="420" y="936" fill="#0A0B0D">1ST LINE</text>
      <rect x="596" y="880" width="155" height="100" rx="6" fill="var(--c-line2)"/>
      <text x="673" y="936" fill="#0A0B0D">2ND LINE</text>
      <rect x="849" y="880" width="155" height="100" rx="6" fill="var(--c-line3)"/>
      <text x="926" y="936" fill="#0A0B0D">3RD LINE</text>
    </g>

    <!-- one check per gap: the watching line reads the score of the one below -->
    <g fill="none" stroke-width="3" stroke-linecap="round">
      <path d="M245 905 A 49 49 0 0 1 343 905" stroke="var(--c-line1)"/>
      <path d="M498 905 A 49 49 0 0 1 596 905" stroke="var(--c-line2)"/>
      <path d="M751 905 A 49 49 0 0 1 849 905" stroke="var(--c-line3)"/>
    </g>
    <g>
      <circle cx="294" cy="856" r="4.5" fill="var(--c-line1)"/>
      <circle cx="547" cy="856" r="4.5" fill="var(--c-line2)"/>
      <circle cx="800" cy="856" r="4.5" fill="var(--c-line3)"/>
    </g>
    <text x="547" y="1066" text-anchor="middle" class="label-mono" font-family="var(--mono)" font-size="15" fill="var(--muted)">each line reads the score below it &middot; the check fires only at the gap</text>
  </svg>
</div>
</body>
</html>
