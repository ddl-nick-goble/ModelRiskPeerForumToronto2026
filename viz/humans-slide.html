<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Humans Are Models Too — A System of Observers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ---------- Palette: Domino dark (matches GFMI / OMERS deck) ---------- */
    --bg:           #0A0B0D;
    --paper:        #14171C;       /* card / panel surface */
    --paper-warm:   #1C2027;       /* slightly raised surface */
    --paper-sunken: #08090B;       /* deepest surface */
    --ink:          #FFFFFF;       /* primary text */
    --text-body:    #D5D9E1;
    --muted:        #8A93A0;
    --rule:         #242932;       /* hairline border */
    --rule-strong:  #3A4150;       /* prominent border */

    --accent:       #EC4899;       /* signature pink — emphasis text & chrome */
    --accent-soft:  rgba(236, 72, 153, 0.18);

    /* ---------- Diagram color axes (mapped to deck accents) ---------- */
    --c-input:   #4DD0E1;   /* cyan  — typed input X */
    --c-output:  #F97316;   /* orange — typed output Y */
    --c-op:      #FFFFFF;   /* white  — the operator itself */
    --c-data:    #2DE2A0;   /* mint   — Ω_data    (what it sees) */
    --c-compute: #4DD0E1;   /* cyan   — Ω_compute (how it reasons) */
    --c-config:  #F4D03F;   /* yellow — Ω_config  (its mandate / stakes) */
    --c-version: #EC4899;   /* pink   — version index */

    /* ---------- The four systems (matches the OMERS lines-of-defense slide) ---------- */
    --c-models:  #EC4899;   /* pink   — the system of models */
    --c-line1:   #2DE2A0;   /* mint   — 1st line · the desk */
    --c-line2:   #4DD0E1;   /* cyan   — 2nd line · risk & validation */
    --c-line3:   #F4D03F;   /* yellow — 3rd line · internal audit */
    --c-reg:     #C9A8FF;   /* lilac  — the regulator (OSFI) */

    --serif: "Playfair Display", "Times New Roman", Georgia, serif;
    --sans:  "Source Sans 3", "Helvetica Neue", Arial, sans-serif;
    --mono:  "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ---------- Stage: 1920×1080 canvas, scaled to viewport ---------- */
  .stage { position: fixed; inset: 0; background: var(--bg); overflow: hidden; }
  .canvas {
    position: absolute;
    top: 50%; left: 50%;
    width: 1920px; height: 1080px;
    margin-left: -960px; margin-top: -540px;
    transform-origin: center center;
    background: var(--bg);
  }
  .container {
    width: 100%; height: 100%;
    padding: 40px 48px;
    display: grid;
    grid-template-rows: minmax(0, 1fr);
  }

  /* ---------- panel (single full-bleed diagram, same as bsmodel/llm) ---------- */
  .panel { background: transparent; border: none; padding: 0; margin: 0; }
  .panel.cases-panel { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .panel.cases-panel .cases {
    flex: 1; min-height: 0; align-items: stretch;
    display: grid; grid-template-columns: minmax(0, 1fr); gap: 0;
  }
  .panel.cases-panel .case-card { height: 100%; min-height: 0; overflow: hidden;
    display: flex; flex-direction: column; background: transparent; border: none; padding: 0; }
  .panel.cases-panel .case-svg-wrap {
    flex: 1 1 0; min-height: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .panel.cases-panel .case-svg-wrap svg { width: 100%; height: 100%; display: block; }

  /* ---------- shared SVG styling ---------- */
  .label-sans  { font-family: var(--sans);  fill: var(--ink); }
  .label-serif { font-family: var(--serif); fill: var(--ink); }
  .label-mono  { font-family: var(--mono); }
  .label-mono:not([fill]) { fill: var(--ink); }
  .lab-eyebrow {
    font-family: var(--sans);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    fill: var(--muted);
    font-weight: 700;
  }
  .lab-muted  { fill: var(--muted); }
  .lab-accent { fill: var(--accent); }

  /* flowing-dash animation for type signatures (identical periods to the series) */
  @keyframes flow-fast-anim { to { stroke-dashoffset: -30; } }
  @keyframes flow-slow-anim { to { stroke-dashoffset: -24; } }
  .flow-fast { stroke-dasharray: 6 4; animation: flow-fast-anim 1.6s linear infinite; }
  .flow-slow { stroke-dasharray: 6 6; animation: flow-slow-anim 4.5s linear infinite; }

  @keyframes pulse { 0%, 100% { opacity: 0.95; } 50% { opacity: 0.5; } }
  .pulse  { animation: pulse 2.4s ease-in-out infinite; }
  .pulse-a { animation: pulse 2.4s ease-in-out infinite; }
  .pulse-b { animation: pulse 2.4s ease-in-out infinite; animation-delay: -0.8s; }
  .pulse-c { animation: pulse 2.4s ease-in-out infinite; animation-delay: -1.6s; }
</style>
</head>
<body>
<div class="stage">
<div class="canvas" id="canvas">
<div class="container">

  <!-- ======================================================================= -->
  <!-- HUMANS ARE MODELS TOO — a system of models feeds a chain of human       -->
  <!-- systems, each a typed operator with its own Ω-lens and its own stakes.  -->
  <!-- Same algebra as bsmodel-slide / llm-slide; tiny nodes = "a system of".  -->
  <!-- ======================================================================= -->
  <div class="panel cases-panel">
    <div class="cases">
      <div class="case-card">
        <div class="case-svg-wrap">
          <svg viewBox="0 0 760 388" xmlns="http://www.w3.org/2000/svg"
               aria-label="A system of models feeding a chain of human systems, each a typed operator with its own lens and stakes">

            <defs>
              <!-- typed-signature arrowheads, one per source system -->
              <marker id="h-am" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-models)"/></marker>
              <marker id="h-a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-line1)"/></marker>
              <marker id="h-a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-line2)"/></marker>
              <marker id="h-a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-line3)"/></marker>
              <!-- Ω-lens feed markers, color-matched to each system -->
              <marker id="h-wm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-models)"/></marker>
              <marker id="h-w1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-line1)"/></marker>
              <marker id="h-w2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-line2)"/></marker>
              <marker id="h-w3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-line3)"/></marker>
              <!-- regulator oversight marker -->
              <marker id="h-reg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="var(--c-reg)"/></marker>

              <!-- a single tiny "person" glyph reused across every human system.
                   fill/stroke are left unset so they inherit from each <use>. -->
              <symbol id="person" viewBox="0 0 12 15">
                <circle cx="6" cy="3.3" r="2.6"/>
                <path d="M1 14.2 C1 9.2 3.1 7.6 6 7.6 C8.9 7.6 11 9.2 11 14.2" fill="none"/>
              </symbol>

              <pattern id="diag-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M40,0 L0,0 L0,40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
              </pattern>
            </defs>

            <!-- drafting-paper grid -->
            <rect x="0" y="0" width="760" height="388" fill="url(#diag-grid)"/>

            <!-- ============================================================ -->
            <!-- REGULATOR BAND (OSFI) — watches the whole function, sits      -->
            <!-- above the three human lines. Drawn first so oversight lines    -->
            <!-- render behind the clusters.                                    -->
            <!-- ============================================================ -->
            <g>
              <rect x="196" y="12" width="506" height="26" fill="none"
                    stroke="var(--c-reg)" stroke-width="1" stroke-dasharray="6 4" rx="3" opacity="0.85"/>
              <rect x="202" y="5" width="118" height="14" fill="var(--bg)" stroke="none"/>
              <text x="208" y="16" class="label-mono" font-size="10" font-weight="700" fill="var(--c-reg)">OSFI · E&#8209;23</text>
              <text x="449" y="29" class="label-mono" font-size="10" fill="var(--text-body)" text-anchor="middle">the regulator is a model of the function &#8212; it watches the system, not each model</text>
              <rect x="606" y="5" width="94" height="15" fill="var(--bg)" stroke="none"/>
              <text x="694" y="16" class="label-mono" font-size="8.5" fill="var(--c-version)" font-weight="700" text-anchor="end">guideline v=2027</text>
              <!-- faint oversight feeds down onto each human line -->
              <path d="M 271,38 L 271,56" fill="none" stroke="var(--c-reg)" stroke-width="1" stroke-dasharray="2 3" marker-end="url(#h-reg)" class="flow-slow" opacity="0.6"/>
              <path d="M 449,38 L 449,56" fill="none" stroke="var(--c-reg)" stroke-width="1" stroke-dasharray="2 3" marker-end="url(#h-reg)" class="flow-slow" opacity="0.6"/>
              <path d="M 627,38 L 627,56" fill="none" stroke="var(--c-reg)" stroke-width="1" stroke-dasharray="2 3" marker-end="url(#h-reg)" class="flow-slow" opacity="0.6"/>
            </g>

            <!-- ============================================================ -->
            <!-- HANDOFF ARROWS between the four systems (typed signatures).    -->
            <!-- Drawn before the cluster boxes so the boxes sit on top.        -->
            <!-- Each carries the SOURCE system's color: its output is the      -->
            <!-- next system's typed input.                                     -->
            <!-- ============================================================ -->
            <!-- Σ_M → 1st line -->
            <line x1="168" y1="132" x2="194" y2="132" stroke="var(--c-models)" stroke-width="1.7" marker-end="url(#h-am)" class="flow-fast"/>
            <text x="181" y="123" class="label-mono" font-size="8.5" fill="var(--c-models)" text-anchor="middle">&#375;</text>
            <!-- 1st → 2nd line -->
            <line x1="346" y1="132" x2="372" y2="132" stroke="var(--c-line1)" stroke-width="1.7" marker-end="url(#h-a1)" class="flow-fast"/>
            <text x="359" y="123" class="label-mono" font-size="8.5" fill="var(--c-line1)" text-anchor="middle">docs</text>
            <!-- 2nd → 3rd line -->
            <line x1="524" y1="132" x2="550" y2="132" stroke="var(--c-line2)" stroke-width="1.7" marker-end="url(#h-a2)" class="flow-fast"/>
            <text x="537" y="123" class="label-mono" font-size="8.5" fill="var(--c-line2)" text-anchor="middle">memo</text>
            <!-- 3rd → out (board / beneficiaries) -->
            <line x1="702" y1="132" x2="730" y2="132" stroke="var(--c-line3)" stroke-width="1.7" marker-end="url(#h-a3)" class="flow-fast"/>

            <!-- terminal: board / beneficiaries -->
            <g transform="translate(708, 150)">
              <text x="12" y="0" class="lab-eyebrow" text-anchor="middle" fill="var(--c-output)" transform="rotate(90 12 0)">board &#183; beneficiaries</text>
            </g>

            <!-- ============================================================ -->
            <!-- SYSTEM 0 · Σ_M — THE SYSTEM OF MODELS (tiny grid of nodes)     -->
            <!-- ============================================================ -->
            <g transform="translate(18, 56)">
              <rect x="0" y="0" width="150" height="158" rx="5" fill="var(--paper)" stroke="var(--rule)" stroke-width="1"/>
              <rect x="0" y="0" width="150" height="5" rx="2.5" fill="var(--c-models)"/>
              <text x="75" y="26" class="label-mono" font-size="9.5" font-weight="700" letter-spacing="2.5" fill="var(--c-models)" text-anchor="middle">&#931;<tspan baseline-shift="sub" font-size="7">M</tspan> &#183; MODELS</text>
              <text x="75" y="46" class="label-serif" font-size="17" font-weight="700" text-anchor="middle">The system</text>

              <!-- a tiny lattice of versioned models (4 × 3) -->
              <g transform="translate(46, 60)">
                <g stroke="var(--c-models)" stroke-width="1.1" fill="var(--paper-warm)">
                  <rect x="0"  y="0"  width="9" height="9" rx="1.5" class="pulse-a"/>
                  <rect x="16" y="0"  width="9" height="9" rx="1.5"/>
                  <rect x="32" y="0"  width="9" height="9" rx="1.5" class="pulse-c"/>
                  <rect x="48" y="0"  width="9" height="9" rx="1.5"/>
                  <rect x="0"  y="16" width="9" height="9" rx="1.5"/>
                  <rect x="16" y="16" width="9" height="9" rx="1.5" fill="var(--c-models)" class="pulse-b"/>
                  <rect x="32" y="16" width="9" height="9" rx="1.5"/>
                  <rect x="48" y="16" width="9" height="9" rx="1.5" class="pulse-a"/>
                  <rect x="0"  y="32" width="9" height="9" rx="1.5"/>
                  <rect x="16" y="32" width="9" height="9" rx="1.5" class="pulse-c"/>
                  <rect x="32" y="32" width="9" height="9" rx="1.5" fill="var(--c-models)" class="pulse-b"/>
                  <rect x="48" y="32" width="9" height="9" rx="1.5"/>
                </g>
              </g>

              <text x="75" y="132" class="label-mono" font-size="9" fill="var(--muted)" text-anchor="middle">M : X &#215; &#937; &#8594; Y</text>
              <text x="75" y="147" class="label-mono" font-size="9" fill="var(--text-body)" text-anchor="middle">stake: <tspan fill="var(--c-models)">the number</tspan></text>
            </g>

            <!-- ============================================================ -->
            <!-- SYSTEM 1 · Σ_H¹ — FIRST LINE · THE DESK                        -->
            <!-- ============================================================ -->
            <g transform="translate(196, 56)">
              <rect x="0" y="0" width="150" height="158" rx="5" fill="var(--paper)" stroke="var(--rule)" stroke-width="1"/>
              <rect x="0" y="0" width="150" height="5" rx="2.5" fill="var(--c-line1)"/>
              <text x="75" y="26" class="label-mono" font-size="9.5" font-weight="700" letter-spacing="2.5" fill="var(--c-line1)" text-anchor="middle">&#931;<tspan baseline-shift="sub" font-size="7">H</tspan><tspan baseline-shift="super" font-size="7">1</tspan> &#183; 1ST LINE</text>
              <text x="75" y="46" class="label-serif" font-size="17" font-weight="700" text-anchor="middle">The desk</text>
              <g fill="none" stroke="var(--c-line1)" stroke-width="1.25">
                <use href="#person" x="37"  y="60" width="11" height="14" class="pulse-a"/>
                <use href="#person" x="58"  y="60" width="11" height="14"/>
                <use href="#person" x="79"  y="60" width="11" height="14" class="pulse-c"/>
                <use href="#person" x="100" y="60" width="11" height="14"/>
                <use href="#person" x="48"  y="80" width="11" height="14"/>
                <use href="#person" x="69"  y="80" width="11" height="14" class="pulse-b"/>
                <use href="#person" x="90"  y="80" width="11" height="14"/>
              </g>
              <text x="75" y="132" class="label-mono" font-size="9" fill="var(--muted)" text-anchor="middle">H : X &#215; &#937; &#8594; Y &#183; <tspan fill="var(--c-version)" font-weight="700">v=4</tspan></text>
              <text x="75" y="147" class="label-mono" font-size="9" fill="var(--text-body)" text-anchor="middle">stake: <tspan fill="var(--c-line1)">the P&amp;L</tspan></text>
            </g>

            <!-- ============================================================ -->
            <!-- SYSTEM 2 · Σ_H² — SECOND LINE · RISK & VALIDATION              -->
            <!-- ============================================================ -->
            <g transform="translate(374, 56)">
              <rect x="0" y="0" width="150" height="158" rx="5" fill="var(--paper)" stroke="var(--rule)" stroke-width="1"/>
              <rect x="0" y="0" width="150" height="5" rx="2.5" fill="var(--c-line2)"/>
              <text x="75" y="26" class="label-mono" font-size="9.5" font-weight="700" letter-spacing="2.5" fill="var(--c-line2)" text-anchor="middle">&#931;<tspan baseline-shift="sub" font-size="7">H</tspan><tspan baseline-shift="super" font-size="7">2</tspan> &#183; 2ND LINE</text>
              <text x="75" y="46" class="label-serif" font-size="17" font-weight="700" text-anchor="middle">Risk &amp; validation</text>
              <g fill="none" stroke="var(--c-line2)" stroke-width="1.25">
                <use href="#person" x="48"  y="60" width="11" height="14" class="pulse-c"/>
                <use href="#person" x="69"  y="60" width="11" height="14"/>
                <use href="#person" x="90"  y="60" width="11" height="14" class="pulse-a"/>
                <use href="#person" x="58"  y="80" width="11" height="14"/>
                <use href="#person" x="79"  y="80" width="11" height="14" class="pulse-b"/>
              </g>
              <text x="75" y="132" class="label-mono" font-size="9" fill="var(--muted)" text-anchor="middle">H : X &#215; &#937; &#8594; Y &#183; <tspan fill="var(--c-version)" font-weight="700">v=3</tspan></text>
              <text x="75" y="147" class="label-mono" font-size="9" fill="var(--text-body)" text-anchor="middle">stake: <tspan fill="var(--c-line2)">the capital</tspan></text>
            </g>

            <!-- ============================================================ -->
            <!-- SYSTEM 3 · Σ_H³ — THIRD LINE · INTERNAL AUDIT                  -->
            <!-- ============================================================ -->
            <g transform="translate(552, 56)">
              <rect x="0" y="0" width="150" height="158" rx="5" fill="var(--paper)" stroke="var(--rule)" stroke-width="1"/>
              <rect x="0" y="0" width="150" height="5" rx="2.5" fill="var(--c-line3)"/>
              <text x="75" y="26" class="label-mono" font-size="9.5" font-weight="700" letter-spacing="2.5" fill="var(--c-line3)" text-anchor="middle">&#931;<tspan baseline-shift="sub" font-size="7">H</tspan><tspan baseline-shift="super" font-size="7">3</tspan> &#183; 3RD LINE</text>
              <text x="75" y="46" class="label-serif" font-size="17" font-weight="700" text-anchor="middle">Internal audit</text>
              <g fill="none" stroke="var(--c-line3)" stroke-width="1.25">
                <use href="#person" x="58" y="60" width="11" height="14" class="pulse-b"/>
                <use href="#person" x="79" y="60" width="11" height="14"/>
                <use href="#person" x="69" y="80" width="11" height="14" class="pulse-a"/>
              </g>
              <text x="75" y="132" class="label-mono" font-size="9" fill="var(--muted)" text-anchor="middle">H : X &#215; &#937; &#8594; Y &#183; <tspan fill="var(--c-version)" font-weight="700">v=2</tspan></text>
              <text x="75" y="147" class="label-mono" font-size="9" fill="var(--text-body)" text-anchor="middle">stake: <tspan fill="var(--c-line3)">the attestation</tspan></text>
            </g>

            <!-- ============================================================ -->
            <!-- TRUST THESIS — the callback line, centered under the chain.    -->
            <!-- ============================================================ -->
            <text x="380" y="236" class="lab-eyebrow" text-anchor="middle" fill="var(--accent)" letter-spacing="0.12em">trust = the composition &#183; each lens catches what the last one missed &#183; trust is what you don&#8217;t automate</text>

            <!-- ============================================================ -->
            <!-- Ω-LENS BAND — humans run on the same substrate as models:      -->
            <!-- data (what they SEE), compute (how they REASON), config        -->
            <!-- (their MANDATE / stakes). Different lens + different stakes     -->
            <!-- per line. Feed arrows rise into each cluster.                   -->
            <!-- ============================================================ -->
            <g transform="translate(0, 250)">

              <!-- feed arrows: each Ω-lens rises into its system (drawn first) -->
              <path d="M 271,8 L 271,-38" fill="none" stroke="var(--c-line1)" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#h-w1)" class="flow-slow"/>
              <path d="M 449,8 L 449,-38" fill="none" stroke="var(--c-line2)" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#h-w2)" class="flow-slow"/>
              <path d="M 627,8 L 627,-38" fill="none" stroke="var(--c-line3)" stroke-width="1.3" stroke-dasharray="3 3" marker-end="url(#h-w3)" class="flow-slow"/>

              <!-- outer Ω container across the three human systems -->
              <rect x="196" y="14" width="506" height="92" fill="none" stroke="var(--rule-strong)" stroke-width="1" stroke-dasharray="6 4" rx="3"/>
              <rect x="202" y="3" width="24" height="18" fill="var(--bg)" stroke="none"/>
              <text x="212" y="17" class="label-serif" font-size="16" font-weight="700" font-style="italic" fill="var(--text-body)" text-anchor="middle">&#937;</text>
              <text x="449" y="120" class="lab-eyebrow" text-anchor="middle">humans have substrate too &#8212; and a version: a re&#8209;org or a new CRO is a v&#8209;bump</text>

              <!-- row labels: the three components, doubled with their human meaning.
                   Placed in the open area beneath the models cluster (left of the box). -->
              <text x="190" y="34" class="label-mono" font-size="9.5" fill="var(--c-data)"    font-weight="700" text-anchor="end">sees</text>
              <text x="190" y="44" class="label-mono" font-size="7.5" fill="var(--muted)" text-anchor="end">&#937;_data</text>
              <text x="190" y="62" class="label-mono" font-size="9.5" fill="var(--c-compute)" font-weight="700" text-anchor="end">reasons</text>
              <text x="190" y="72" class="label-mono" font-size="7.5" fill="var(--muted)" text-anchor="end">&#937;_compute</text>
              <text x="190" y="90" class="label-mono" font-size="9.5" fill="var(--c-config)"  font-weight="700" text-anchor="end">mandate</text>
              <text x="190" y="100" class="label-mono" font-size="7.5" fill="var(--muted)" text-anchor="end">&#937;_config</text>

              <!-- a reminder that Σ_M's substrate was the prior two slides -->
              <text x="93" y="40" class="lab-eyebrow" text-anchor="middle">&#937;<tspan baseline-shift="sub" font-size="6">M</tspan> substrate</text>
